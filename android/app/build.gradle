plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def globalProperties = new Properties()
globalProperties.load(new FileInputStream(rootProject.file("global.properties")))

android {
    namespace = "com.example.delivera"
    compileSdk = globalProperties['flutter.compileSdkVersion']?.toInteger() ?: flutter.compileSdkVersion
    ndkVersion = globalProperties['flutter.ndkVersion'] ?: flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.delivera.delivera"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = globalProperties['flutter.minSdkVersion']?.toInteger() ?: flutter.minSdkVersion
        targetSdk = globalProperties['flutter.targetSdkVersion']?.toInteger() ?: flutter.targetSdkVersion
        versionCode = globalProperties['flutter.versionCode']?.toInteger() ?: flutter.versionCode
        versionName = globalProperties['flutter.versionName'] ?: flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
